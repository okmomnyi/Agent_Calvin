<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentOS</title>
<style>
  :root{
    --bg:#15181c; --panel:#1c2126; --line:#2c343c; --ink:#e6e9ec; --dim:#8b959f;
    --amber:#d9a441; --teal:#3fa39b; --red:#c2554d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:15px/1.5 "IBM Plex Sans",system-ui,-apple-system,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 18px;
         border-bottom:1px solid var(--line);background:var(--panel)}
  h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:0;font-weight:600}
  .led{width:9px;height:9px;border-radius:2px;background:var(--dim);
       box-shadow:inset 0 0 0 1px #0006}
  .led.on{background:var(--teal)} .led.off{background:var(--red)}
  main{max-width:920px;margin:0 auto;padding:18px;display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .card h2{margin:0 0 10px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
           color:var(--dim);font-weight:600}
  .mono{font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
  .row{display:flex;gap:8px;align-items:center}
  input,button,textarea{font:inherit}
  input,textarea{background:#12151a;border:1px solid var(--line);color:var(--ink);
                 border-radius:6px;padding:9px 11px;width:100%}
  button{background:var(--amber);border:0;color:#1a1408;font-weight:600;border-radius:6px;
         padding:9px 15px;cursor:pointer;white-space:nowrap}
  button.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:default}
  ul{list-style:none;margin:0;padding:0}
  li{padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:10px}
  li:last-child{border-bottom:0}
  .tag{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);
       min-width:78px}
  .dim{color:var(--dim)} .teal{color:var(--teal)}
  #log{max-height:320px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .turn{border-left:2px solid var(--line);padding-left:10px}
  .turn .you{color:var(--amber)} .turn .them{white-space:pre-wrap}
  .chan{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .err{color:var(--red)}
</style>
</head>
<body>
<header>
  <span class="led" id="led"></span>
  <h1>AgentOS</h1>
  <span class="dim mono" id="hdr">dashboard · 4th channel</span>
</header>

<main>
  <!-- token is kept in localStorage only; every call is Bearer-authed like any other client -->
  <div class="card" id="authcard">
    <h2>Access token</h2>
    <div class="row">
      <input id="token" type="password" placeholder="AGENT_WS_TOKEN" autocomplete="off">
      <button id="save">Connect</button>
      <button id="forget" class="ghost">Forget</button>
    </div>
    <p class="dim" style="margin:8px 0 0">Same <span class="mono">AGENT_WS_TOKEN</span> the voice client uses. Stored in this browser only.</p>
  </div>

  <div class="card">
    <h2>Session — one thread, every device</h2>
    <div id="session" class="dim">Not connected.</div>
  </div>

  <div class="card">
    <h2>Waiting on you</h2>
    <ul id="approvals"><li class="dim">—</li></ul>
  </div>

  <div class="card">
    <h2>Talk to it</h2>
    <div class="row">
      <input id="say" placeholder="e.g. what's waiting on me / any new jobs? / continuing from my phone">
      <button id="send">Send</button>
    </div>
    <div id="log" style="margin-top:12px"></div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const tokenKey = "agentos_token";
let token = localStorage.getItem(tokenKey) || "";
if (token) $("#token").value = token;

const setLed = ok => $("#led").className = "led " + (ok ? "on" : "off");

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token, ...(opts.headers||{}) }
  });
  if (res.status === 401) throw new Error("Unauthorized — check the token.");
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function renderSession(s) {
  const live = s.live_skill_session || s.active_skill;
  const plan = s.current_plan;
  $("#session").innerHTML =
    `<div>Last active on <b class="teal">${esc(s.last_channel || "—")}</b>` +
    (live ? ` · live: <b class="teal">${esc(live)}</b>` : " · nothing mid-flight") +
    `</div>` + (plan ? `<div>Plan <b class="teal">${esc(plan.id)}</b> ` +
      `<span class="tag">${esc(plan.status)}</span> ${esc(plan.goal)}</div>` : "") +
    `<div class="dim mono">${(s.turns||[]).length} turns remembered</div>`;
  const ul = $("#approvals");
  const items = [...(s.pending_approvals || [])];
  if (plan && ["awaiting_approval", "paused"].includes(plan.status)) {
    items.unshift({kind:"plan", what:plan.goal, action:plan.status});
  }
  ul.innerHTML = items.length
    ? items.map(i => `<li><span class="tag">${esc(i.kind)}</span><span>${esc(i.what)}</span>
                      <span class="dim">— ${esc(i.action)}</span></li>`).join("")
    : `<li class="dim">Nothing. 🎉</li>`;
  $("#log").innerHTML = (s.turns||[]).slice(-6).map(t =>
    `<div class="turn"><div class="chan">${esc(t.channel)}</div>
     <div class="you">› ${esc(t.text)}</div><div class="them">${esc(t.reply)}</div></div>`).join("");
  $("#log").scrollTop = $("#log").scrollHeight;
}

const esc = value => String(value ?? "").replace(/[<>&"']/g, c => (
  {"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c]
));

async function refresh() {
  if (!token) { setLed(false); return; }
  try {
    renderSession(await api("/api/session"));
    setLed(true);
  } catch (e) {
    setLed(false);
    $("#session").innerHTML = `<span class="err">${esc(e.message)}</span>`;
  }
}

async function send() {
  const text = $("#say").value.trim();
  if (!text || !token) return;
  $("#send").disabled = true;
  try {
    // channel:"dashboard" so the session knows where this turn came from
    await api("/api/command", { method: "POST", body: JSON.stringify({ text, channel: "dashboard" }) });
    $("#say").value = "";
    await refresh();
  } catch (e) {
    $("#session").innerHTML = `<span class="err">${esc(e.message)}</span>`;
  } finally {
    $("#send").disabled = false;
  }
}

$("#save").onclick = () => { token = $("#token").value.trim(); localStorage.setItem(tokenKey, token); refresh(); };
$("#forget").onclick = () => { localStorage.removeItem(tokenKey); token = ""; $("#token").value = ""; setLed(false); };
$("#send").onclick = send;
$("#say").addEventListener("keydown", e => { if (e.key === "Enter") send(); });

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
