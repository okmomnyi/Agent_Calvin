  #   gdg_nairobi:    { url: "https://gdg.community.dev/gdg-nairobi/events.ics", kind: ics, tags: [hackathons & tech meetups], format: physical }

# --- Flash-flip deal broker (Phase 16) ---
# Capital-risk rules are enforced in code, not config: AgentOS never spends money (purchase
# needs an approved purchase gate) and never messages sellers/buyers (it drafts, Calvin sends).
flip:
  min_price_gap_pct: 0.20      # must be >=20% below the comp median to pursue
  min_listing_age_days: 14     # staleness proxy — unnoticed listings won't sell mid-negotiation
  max_velocity_days: 7         # flash-sale filter: slow categories never enter the pipeline
  min_score: 60
  flash_window_hours: 48       # no buyer in the window -> price-drop tier, then expire
  price_drop_tiers: [0.9, 0.8] # successive resale multipliers before expiring
  opening_offer_pct: 0.85      # opening offer vs. min(asking, comp)

  # Phase 17: an item is cross-posted to ALL of these at once, under ONE flash window.
  # first-committed-buyer-wins delisting is a hard rule in code, not a setting here.
  resale_platforms: [jiji, pigiame]

  # Phase 18: platform/transaction fees deducted when the margin ledger closes a position.
  platform_fee_pct: 0.0        # e.g. 0.05 for a 5% marketplace fee

  # Historical time-to-sale per category (Phase 18's margin ledger refines these).
  category_velocity_days:
    default: 7
    phones: 3
    laptops: 5
    electronics: 5
    furniture: 21              # > max_velocity_days -> rejected at sourcing
    vehicles: 45

  # Lower-risk marketplaces only. Facebook Marketplace is deliberately NOT scraped:
  # Meta actively pursues scrapers (§16 trust & compliance).
  sources:
    jiji:    { enabled: false, url: "https://jiji.co.ke/api_web/v1/listing?slug=electronics" }
    pigiame: { enabled: false, url: "https://www.pigiame.co.ke/electronics" }

# --- Study Vault (Phase 9) — RAG over course materials ---
vault:
  embedder: auto          # auto | sentence-transformers | hashing
  min_score: 0.18         # retrieval confidence floor; below this -> "not in your notes"

# --- Spaced repetition (Phase 11) ---
srs:
  daily_hour: 18          # local hour to send the "cards due" reminder

# --- Semester planner (Phase 13) ---
planner:
  briefing_hour: 7        # local hour for the unified morning briefing
  # Ongoing freelance/client/volunteer commitments surfaced in the briefing. Examples —
  # replace with your own. Naming a real client here publishes that relationship if this
  # repo is public, which is theirs to disclose, not yours.
  commitments:
    - "Example Co — client web app"
    - "Local tech hub — volunteer"

# --- Self-audit / infra recon (Phase 21) — REPORT ONLY, enrolled targets only ---
infra:
  tls_warn_days: 21           # warn this far ahead of certificate expiry
  probe_ports: [22, 80, 443, 3000, 5432, 8000, 8080]
  # Enroll hosts you own via `manage.py infra enroll <host> --ports 80,443`.
  # Anything open that isn't listed as expected becomes a finding.
  targets: {}
  #   agent.example.com: [80, 443]

# --- GitHub profile import (Phase 25) ---
# Calvin's public repos seed his persona (skills, projects). `collaborations` lists repos he
# contributes to but does NOT own -- the contributor graph is public, so his commit count and
# teammates are read from there. Add a repo full-name and it's picked up on the next import.
github:
  user: okmomnyi
  collaborations:
    - Techtoxic/ums               # UMS — University Management System (live)
    - David-0chieng/Project47
    - yarrbakr/ZameenEye-AI
    - Kainat90/ZKSentinel         # trustless AI trading agent, ZK proofs
    - 13getid/Moderno
    - Mark254-creator/fixit-app   # FastAPI + React + MySQL booking platform

# --- Desktop app control (Phase 23) — laptop-side, voice-triggered ---
# App KEYS only. The droplet never learns an executable path: it just names one of these, and
# the laptop (client/apps.yaml) decides what it means and can refuse. That file is the real
# allowlist — this list only lets the server say "I don't know that app" nicely.
# Keys here must exist in client/apps.yaml or the laptop will (correctly) refuse them.
desktop:
  apps: [spotify, code, chrome, telegram, terminal]

# --- Music companion (Phase 22) ---
# Spotify removed Recommendations/Audio-Features/Related-Artists for new apps, and the Web
# API cannot mix audio — so "DJ mode" is sequencing + narration, never beatmatching.
music:
  dj_narration: true          # speak a short line to open a set (stock voice only, §0 P9)

# --- Adaptive behavior layer (Phase 20) ---
adaptive:
  threshold: 4        # times a pattern must repeat (with NO contradicting instance) to propose

# --- Voice registry (Phase 7) — pre-built neural voices ONLY (Principle 9, §0) ---
voice:
  default: guy
  registry:
    guy:    "en-US-GuyNeural"
    aria:   "en-US-AriaNeural"
    ryan:   "en-GB-RyanNeural"
    rafiki: "sw-KE-RafikiNeural"
    zuri:   "sw-KE-ZuriNeural"
