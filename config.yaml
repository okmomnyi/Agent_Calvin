# AgentOS configuration — non-secret, safe to commit. Secrets live in .env.
# Principle 2 (§0): model routing, never hardcoding. Every LLM call declares a task
# class and the router maps class -> model here. Edit models freely; no code change needed.

llm:
  base_url: "https://integrate.api.nvidia.com/v1"   # default NIM endpoint
  default_api_key_env: NVIDIA_API_KEY               # default key env var (fallback for every task)

  # task class -> route. The best model is chosen PER TASK (coder model for code, reasoning
  # model for research, cheap model for high-volume classify). Each route may ALSO declare:
  #   api_key_env: <ENV_VAR>   — a task-specific key, so concurrent work (scheduler + bot +
  #                              voice, all at once) spreads across separate rate-limit buckets
  #   base_url:    <URL>       — a task-specific endpoint (still NIM-compatible; free-first §0)
  #   temperature / max_tokens — per-task generation defaults
  # Any unset field falls back to the defaults, so a SINGLE NVIDIA_API_KEY still works everywhere.
  # A route may be a bare model string OR a dict as below. Add a class = add a line; the kernel
  # never changes (Principle 2: routing, never hardcoding).
  routes:
    default:     { model: "meta/llama-3.1-8b-instruct" }
    classify:    { model: "meta/llama-3.1-8b-instruct", api_key_env: NVIDIA_API_KEY_FAST,     temperature: 0.0 }
    write:       { model: "mistralai/mistral-medium-3.5-128b", api_key_env: NVIDIA_API_KEY_WRITE }
    persona:     { model: "mistralai/mistral-medium-3.5-128b", api_key_env: NVIDIA_API_KEY_WRITE }
    code_review: { model: "deepseek-ai/deepseek-v4-pro", api_key_env: NVIDIA_API_KEY_CODE }
    research:    { model: "nvidia/nemotron-3-super-120b-a12b", api_key_env: NVIDIA_API_KEY_RESEARCH, max_tokens: 1500 }
    voice_chat:  { model: "meta/llama-3.1-8b-instruct", api_key_env: NVIDIA_API_KEY_FAST }

  # generation defaults (used when a route/call doesn't override them)
  defaults:
    temperature: 0.4
    max_tokens: 1024
  request:
    timeout_seconds: 60
    max_retries: 4
    backoff_base_seconds: 1.5   # exponential: base * 2**attempt, honouring Retry-After on 429

# --- Job hunter target profile (Phase 3) — editable ---
jobs:
  # PRIMARY is what the scorer ranks highest. Cloud/DevOps leads because that is the field
  # Calvin is building toward -- the digests were surfacing transcription voice-artist roles
  # over SRE/DevOps ones purely because this list said so. Editable at runtime, not just here:
  # `/profile primary cloud engineer, DevOps` rewrites it (stored in memory, survives deploys),
  # so it can track where his focus actually goes instead of staying frozen in this file.
  primary:
    - cloud computing & DevOps (junior/associate cloud engineer, DevOps engineer, cloud support engineer, SRE, site reliability, platform engineer, Linux sysadmin, NOC, IT support, AWS/GCP/Azure, Docker, Kubernetes, Terraform, CI/CD)
    - full-stack / backend software (TypeScript, JavaScript, Node, Python, React, Next.js) — matches his GitHub
  secondary:
    - remote transcription (general, Swahili/English bilingual, audio QC, subtitling, captioning, audio data annotation)
  also:
    - paid internships (software, data, cloud/DevOps, localization/transcription) — remote or Nairobi
  score_threshold: 60
  skip_unpaid: true
  max_score_per_run: 40        # cap LLM scoring per hunt; overflow deferred (never silently dropped)
  # cybersecurity/pentesting may surface & score normally but has no dedicated source

  # Generic RSS/Atom feeds — add a line and it works (parsed by sources/rss.py).
  rss_feeds:
    weworkremotely:
      url: "https://weworkremotely.com/remote-jobs.rss"
    wwr_devops:
      url: "https://weworkremotely.com/categories/remote-devops-sysadmin-jobs.rss"
      category: cloud_devops
    himalayas:
      url: "https://himalayas.app/jobs/rss"
    myjobmag_kenya:
      url: "https://www.myjobmag.co.ke/jobsxml.xml"
    cncf:
      url: "https://jobs.cncf.io/jobs.rss"
      category: cloud_devops

  # Transcription portals — notify-only signup links (no email apply path).
  transcription_portals:
    - { name: Rev,            url: "https://www.rev.com/freelancers" }
    - { name: TranscribeMe,   url: "https://www.transcribeme.com/careers/" }
    - { name: GoTranscript,   url: "https://gotranscript.com/transcription-jobs" }
    - { name: Scribie,        url: "https://scribie.com/jobs" }
    - { name: Verbit,         url: "https://verbit.ai/careers/" }
    - { name: Way With Words, url: "https://waywithwords.net/careers/" }
    - { name: Athreon,        url: "https://www.athreon.com/careers/" }

# --- Event Scout interest tags (Phase 14) — /tags add|remove <tag> edits these ---
